<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Better Sam</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

/* ===== Component 1: page title ===== */
.dash-title {
  margin: 0 0 14px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Component 2: Goal Ticker ===== */
.ticker-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
  margin-bottom: 18px;
}
.goal-ticker {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.goal-ticker::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  width: 30%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
  animation: ticker-sweep 8s linear infinite;
}
@keyframes ticker-sweep {
  0%   { left: -40%; }
  100% { left: 110%; }
}
.goal-ticker-led { display: inline-flex; align-items: center; }
.goal-ticker-led-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #6BE3A4;
  box-shadow: 0 0 8px rgba(107,227,164,0.7);
  animation: led-pulse 1.6s ease-in-out infinite;
}
@keyframes led-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.45; transform: scale(0.85); }
}
.goal-ticker-label {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
}
.goal-ticker-stage {
  position: relative; overflow: hidden;
  flex: 1; height: 22px;
}
.goal-ticker-row {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 12.5px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  white-space: nowrap;
  opacity: 1;
  transition: opacity 0.22s ease;
}
.goal-ticker-row.is-fading { opacity: 0; }
.goal-ticker-status {
  display: inline-flex; justify-content: center;
  width: 18px;
  color: var(--text-tertiary);
}
.goal-ticker-status[data-status="done"]    { color: var(--success); }
.goal-ticker-status[data-status="pending"] { color: var(--text-tertiary); }
.goal-ticker-text {
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.goal-ticker-meta {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
}
@media (max-width: 480px) {
  .ticker-row { margin-bottom: 14px; }
  .goal-ticker { gap: 6px; padding: 5px 8px; border-radius: 10px; }
  .goal-ticker-led-dot { width: 5px; height: 5px; }
  .goal-ticker-label { font-size: 7.5px; letter-spacing: 0.10em; }
  .goal-ticker-stage { height: 18px; }
  .goal-ticker-row { gap: 5px; font-size: 10px; }
  .goal-ticker-status { width: 12px; }
  .goal-ticker-meta { font-size: 9px; padding: 1px 5px; }
}

/* ===== Component 3: Day Ring ===== */
.day-ring-wrap {
  display: flex; flex-wrap: wrap;
  align-items: center; justify-content: center;
  gap: 26px;
  padding: 22px;
  margin-bottom: 22px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.day-ring {
  position: relative;
  width: 168px; height: 168px;
  flex-shrink: 0;
}
.day-ring svg { width: 100%; height: 100%; display: block; }
.day-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
.day-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
  transition: stroke 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
.day-ring-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.day-ring-percent {
  font-size: 40px; font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.04em;
  color: var(--text-primary);
  line-height: 1;
}
.day-ring-phase {
  margin-top: 5px;
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.day-ring-clock {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.day-ring-text {
  display: flex; flex-direction: column;
  gap: 6px;
  max-width: 280px;
}
.day-ring-status { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.day-ring-remaining { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
.day-ring-hours { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
@media (max-width: 480px) {
  .day-ring { width: 144px; height: 144px; }
  .day-ring-percent { font-size: 32px; }
  .day-ring-status { font-size: 13px; }
}

/* ===== Component 4: Habit Tracker ===== */
.habit-card {
  padding: 16px;
}
.habit-market {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  min-height: 38px;
  margin-bottom: 14px;
  padding: 8px 12px;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0.24)),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
  border: 1px solid rgba(255,255,255,0.06);
}
.habit-market-label {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
}
.habit-market-stage {
  flex: 1; overflow: hidden;
}
.habit-market-track {
  display: flex; align-items: center; gap: 8px;
  width: max-content;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  animation: habit-tape 18s linear infinite;
}
.habit-market:hover .habit-market-track {
  animation-play-state: paused;
}
.habit-market-item {
  display: inline-flex; align-items: center; gap: 8px;
  padding-right: 20px;
}
.habit-market-symbol { color: var(--success); font-size: 10px; letter-spacing: 0.10em; }
.habit-market-text { color: var(--text-primary); }
@keyframes habit-tape {
  from { transform: translateX(-50%); }
  to   { transform: translateX(0); }
}
.habit-summary {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  margin-bottom: 14px;
}
.habit-stat {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.055);
}
.habit-stat-label {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.habit-stat-value {
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 800;
  color: var(--text-primary);
}
.habit-list {
  display: grid; gap: 8px;
}
.habit-row {
  display: flex; align-items: center; gap: 12px;
  width: 100%;
  padding: 11px 12px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  background: rgba(255,255,255,0.035);
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
}
.habit-row.is-done {
  border-color: rgba(107,227,164,0.24);
  background: rgba(107,227,164,0.08);
}
.habit-check {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.12);
  color: transparent;
  font-weight: 900;
  flex-shrink: 0;
}
.habit-row.is-done .habit-check {
  background: var(--success);
  border-color: var(--success);
  color: #07110C;
}
.habit-main { flex: 1; min-width: 0; }
.habit-name {
  color: var(--text-primary);
  font-size: 14px; font-weight: 700;
}
.habit-meta {
  margin-top: 2px;
  color: var(--text-tertiary);
  font-size: 11px;
}
.habit-sync-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.habit-sync-btn {
  border: 1px solid rgba(125,211,252,0.22);
  border-radius: 10px;
  background: rgba(125,211,252,0.08);
  color: #BFEAFF;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: 9px 11px;
  cursor: pointer;
}
.habit-sync-status {
  flex: 1;
  color: var(--text-tertiary);
  font-size: 11px;
}
.habit-grid-card {
  padding: 16px;
}
.habit-grid-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 12px;
}
.habit-grid-title {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.habit-grid-filters {
  display: flex; gap: 6px;
}
.habit-grid-filter {
  border: 1px solid rgba(125,211,252,0.14);
  border-radius: 999px;
  background: rgba(12,35,58,0.28);
  color: #7DB7DD;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.08em;
  padding: 6px 8px;
  cursor: pointer;
}
.habit-grid-filter.is-active {
  background: rgba(125,211,252,0.18);
  color: #D6F3FF;
  border-color: rgba(125,211,252,0.36);
}
.habit-grid-wrap {
  overflow-x: auto;
  padding: 2px 0 4px;
}
.habit-grid {
  display: grid;
  grid-auto-flow: column;
  grid-template-rows: repeat(7, 10px);
  grid-auto-columns: 10px;
  gap: 3px;
  width: max-content;
  min-width: 100%;
}
.habit-cell {
  width: 10px; height: 10px;
  border-radius: 2px;
  background: rgba(10,28,48,0.62);
  border: 1px solid rgba(125,211,252,0.05);
}
.habit-cell.l1 { background: rgba(37,99,145,0.46); }
.habit-cell.l2 { background: rgba(56,139,197,0.62); }
.habit-cell.l3 { background: rgba(91,180,232,0.78); }
.habit-cell.l4 { background: #9BDBFF; box-shadow: 0 0 6px rgba(125,211,252,0.35); }
@media (max-width: 480px) {
  .habit-card { padding: 14px; }
  .habit-market { gap: 7px; min-height: 34px; padding: 7px 9px; }
  .habit-market-label { font-size: 7.5px; letter-spacing: 0.10em; }
  .habit-market-track { font-size: 10px; gap: 6px; }
  .habit-stat-value { font-size: 19px; }
  .habit-row { padding: 10px; }
  .habit-grid-head { align-items: flex-start; flex-direction: column; }
}

/* ===== Component 4: section + To Do List ===== */
.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.6;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  transition: background 0.4s;
  overflow: hidden;
}
.gm-card.gm-all-done::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(107,227,164,0.10), transparent 60%);
  pointer-events: none;
}
.gm-card.gm-all-done .gm-progress-num,
.gm-card.gm-all-done .gm-progress-label { color: var(--success); }

.gm-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  margin-bottom: 14px;
  position: relative;
}
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num {
  font-size: 42px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.045em;
  color: var(--text-primary);
  line-height: 1;
}
.gm-progress-total {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--text-tertiary);
}
.gm-progress-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-left: 4px;
}
.gm-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-tertiary);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  transition: background 0.25s, color 0.25s, border-color 0.25s;
}
.gm-streak-icon { font-size: 13px; }
.gm-streak-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.gm-streak.gm-streak-active {
  background: rgba(242,192,99,0.10);
  color: #F2C063;
  border-color: rgba(242,192,99,0.32);
}
.gm-streak.gm-streak-active .gm-streak-icon {
  filter: drop-shadow(0 0 6px rgba(242,192,99,0.6));
}

.gm-bar {
  display: flex; gap: 4px;
  height: 6px;
  margin-bottom: 16px;
}
.gm-bar:empty { display: none; }
.gm-bar-seg {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  transition: background 0.3s, box-shadow 0.3s;
}
.gm-bar-seg-done {
  background: #6BE3A4;
  box-shadow: 0 0 6px rgba(107,227,164,0.40);
}

.gm-filterbar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.gm-filter-btn {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  background: rgba(255,255,255,0.035);
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: 7px 10px;
  cursor: pointer;
}
.gm-filter-btn.is-active {
  background: rgba(255,255,255,0.10);
  color: var(--text-primary);
  border-color: rgba(255,255,255,0.18);
}
.gm-term-badge {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 4px 7px;
}
.gm-term-select {
  display: flex; gap: 4px;
  padding: 3px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  background: rgba(255,255,255,0.035);
}
.gm-term-btn {
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 9px;
  cursor: pointer;
}
.gm-term-btn.is-active {
  background: rgba(255,255,255,0.12);
  color: var(--text-primary);
}

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state {
  text-align: center;
  font-size: 12px; font-style: italic;
  color: var(--text-tertiary);
  padding: 14px 0;
}

.gm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
  position: relative;
}
.gm-row:hover { background: rgba(255,255,255,0.06); }
.gm-row.gm-row-done {
  opacity: 0.45;
  background: rgba(107,227,164,0.04);
}
.gm-row.gm-row-done .gm-text {
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,0.4);
}
.gm-row.gm-row-queued {
  background: rgba(242,192,99,0.10);
  box-shadow: inset 3px 0 0 0 #F2C063;
}
.gm-row.gm-row-queued .gm-text { color: #FFE2A8; }
.gm-row.is-drag-over { border-top: 2px solid #6BE3A4; }
.gm-row.is-queue-flashing { animation: gm-queue-flash 0.48s ease-out; }
@keyframes gm-queue-flash {
  0%   { background: rgba(255,255,255,0.035); transform: scale(1); }
  40%  { background: rgba(242,192,99,0.32); transform: scale(1.015); }
  100% { background: rgba(255,255,255,0.035); transform: scale(1); }
}

.gm-handle {
  width: 14px; flex-shrink: 0;
  color: var(--text-tertiary);
  font-weight: 700; font-size: 14px;
  letter-spacing: -2px;
  cursor: grab;
  opacity: 0;
  transition: opacity 0.2s;
  user-select: none;
}
.gm-row:hover .gm-handle { opacity: 1; }
.gm-handle:active { cursor: grabbing; }

.gm-check {
  appearance: none; -webkit-appearance: none;
  width: 22px; height: 22px; flex-shrink: 0;
  margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.28);
  border-radius: 7px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked {
  background: #6BE3A4;
  border-color: #6BE3A4;
  box-shadow: 0 0 12px rgba(107,227,164,0.40);
}
.gm-check:checked::after {
  content: '';
  position: absolute; left: 6px; top: 2px;
  width: 6px; height: 11px;
  border: solid #0A0A0B;
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
  animation: gm-check-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes gm-check-pop {
  from { transform: rotate(45deg) scale(0); }
  to   { transform: rotate(45deg) scale(1); }
}
.gm-check:disabled { cursor: not-allowed; opacity: 0.55; }

.gm-text {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  cursor: text;
  outline: none;
  border-radius: 4px;
  padding: 2px 4px;
  margin: -2px -4px;
}
.gm-text[contenteditable="true"] {
  outline: 1px solid rgba(255,255,255,0.18);

.gm-queue-btn {

  color: var(--text-tertiary);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  opacity: 0.55;
  transition: opacity 0.2s, color 0.2s, transform 0.1s;
}
.gm-queue-btn:hover { opacity: 1; }
.gm-queue-btn.gm-queue-active {
  color: #F2C063;
  opacity: 1;
  filter: drop-shadow(0 0 4px rgba(242,192,99,0.65));
}
.gm-queue-btn:disabled { cursor: not-allowed; opacity: 0.3; }

.goal-delete {
  border: 0; background: transparent;
  color: var(--text-tertiary);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  opacity: 0.5;

}

.gm-show-toggle {
  width: 100%;
  margin: 6px 0 0;
  padding: 9px;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 10px;

.goal-input-wrap.gm-input-wrap {

.gm-add {

.gm-polish {

}

  color: var(--text-tertiary);
  min-height: 14px;

}

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) calc(50px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left)); }
  .gm-card { padding: 16px; }

}

<body>

<script>
(function () {
  'use strict';

  // Paste your Anthropic key here to enable ✨ Polish. Empty = falls back to plain add.
  const ANTHROPIC_API_KEY = '';

  const WAKE_HOUR  = 8;
  const SLEEP_HOUR = 24;

  // ---------- storage helpers ----------
  function storeGet(key) {
    try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    if (typeof key === 'string' && key.indexOf('goals:') === 0) {
      window.dispatchEvent(new CustomEvent('goals-changed'));
    }
  }
  function storeDelete(key) { try { localStorage.removeItem(key); } catch (e) {} }
  function storeListKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) out.push(k);
    }
    return out;
  }

  // ---------- date helpers ----------
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function getActiveDateString() {
    const now = new Date();
    if (now.getHours() < 6) {
      const d = new Date(now);
      d.setDate(d.getDate() - 1);
      return dateToKey(d);
    }
    return dateToKey(now);
  }
  function formatDate(yyyy_mm_dd) {
    const parts = yyyy_mm_dd.split('-').map(Number);
    const d = new Date(parts[0], parts[1] - 1, parts[2]);
    const wk = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    return wk + ', ' + mo + ' ' + d.getDate();
  }

  function todayKey()    { return 'goals:' + getActiveDateString(); }

  function getGoals(key) {
    const g = storeGet(key);
    return Array.isArray(g) ? g : [];
  }
  function setGoals(key, list) { storeSet(key, list); }
  function goalTerm(goal) {
    return goal && goal.term === 'long' ? 'long' : 'short';
  }
  function visibleGoals(goals) {
    if (activeGoalFilter === 'short' || activeGoalFilter === 'long') {
      return goals
        .map((goal, idx) => ({ goal, idx }))
        .filter(entry => goalTerm(entry.goal) === activeGoalFilter);
    }
    return goals.map((goal, idx) => ({ goal, idx }));
  }

  // ---------- habits ----------
  const HABIT_KEY = 'habits:v1';
  const DEFAULT_HABITS = [
    { id: 'run', name: 'Run', createdAt: '2026-01-01T00:00:00.000Z' },
    { id: 'gym', name: 'Gym', createdAt: '2026-01-01T00:00:00.000Z' }
  ];
  const habitTrack = document.getElementById('habitMarketTrack');
  let habitTickerTimer = null;
  let activeHabitGrid = 'all';
  let activeGoalFilter = 'all';
  let activeGoalTerm = 'short';

  function getHabitState() {
    const raw = storeGet(HABIT_KEY);
    const state = raw && typeof raw === 'object' ? raw : {};
    const byId = {};
    const existing = Array.isArray(state.habits) ? state.habits : [];
    existing.forEach(h => { if (h && h.id) byId[h.id] = h; });
    DEFAULT_HABITS.forEach(h => {
      if (!byId[h.id]) byId[h.id] = Object.assign({}, h);
    });
    const ordered = DEFAULT_HABITS
      .map(h => byId[h.id])
      .concat(existing.filter(h => h && h.id && !DEFAULT_HABITS.some(d => d.id === h.id)));
    return {
      habits: ordered,
      logs: state.logs && typeof state.logs === 'object' ? state.logs : {}
    };
  }
  function habitIdFromName(name, state) {
    const base = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'habit';
    let id = base;
    let n = 2;
    const existing = new Set((state.habits || []).map(h => h.id));
    while (existing.has(id)) id = base + '-' + n++;
    return id;
  }
  function setHabitState(state) {
    storeSet(HABIT_KEY, state);
    window.dispatchEvent(new CustomEvent('habits-changed'));
  }
  function isHabitDone(state, habitId, dateStr) {
    return !!(state.logs[habitId] && state.logs[habitId][dateStr]);
  }
  function toggleHabit(habitId) {
    const state = getHabitState();
    const dateStr = getActiveDateString();
    if (!state.logs[habitId]) state.logs[habitId] = {};
    if (state.logs[habitId][dateStr]) delete state.logs[habitId][dateStr];
    else state.logs[habitId][dateStr] = true;
    setHabitState(state);
    renderHabits();
    renderHabitMarket();
  }
  function addHabit(name) {
    const clean = String(name || '').trim();
    if (!clean) return;
    const state = getHabitState();
    state.habits.push({
      id: habitIdFromName(clean, state),
      name: clean,
      createdAt: new Date().toISOString()
    });
    setHabitState(state);
    renderHabits();
    renderHabitMarket();
  }
  function habitStreak(state, habitId) {
    let streak = 0;
    const d = new Date(getActiveDateString() + 'T12:00:00');
    while (isHabitDone(state, habitId, dateToKey(d))) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }
  function habitBestStreak(state, habitId) {
    const dates = Object.keys(state.logs[habitId] || {}).sort();
    let best = 0;
    let current = 0;
    let prev = null;
    dates.forEach(dateStr => {
      const date = new Date(dateStr + 'T12:00:00');
      const diff = prev ? Math.round((date - prev) / 86400000) : 1;
      current = diff === 1 ? current + 1 : 1;
      best = Math.max(best, current);
      prev = date;
    });
    return Math.max(best, habitStreak(state, habitId));
  }
  function habitRate(state, habitId) {
    const today = new Date(getActiveDateString() + 'T12:00:00');
    let done = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      if (isHabitDone(state, habitId, dateToKey(d))) done++;
    }
    return Math.round(done / 30 * 100);
  }
  function buildHabitMarketItems(state) {
    if (!state.habits.length) return [{ symbol: 'HAB', text: 'No habits yet' }];
    return state.habits.map(h => {
      const streak = habitStreak(state, h.id);
      const done = isHabitDone(state, h.id, getActiveDateString());
      return {
        symbol: h.name.slice(0, 3).toUpperCase(),
        text: h.name + ' ' + (done ? 'closed green' : 'open') + ' · ' + streak + 'd streak'
      };
    });
  }
  function renderHabitMarket() {
    if (!habitTrack) return;
    const state = getHabitState();
    const items = buildHabitMarketItems(state);
    const tape = items.concat(items);
    habitTrack.innerHTML = '';
    tape.forEach(item => {
      const wrap = document.createElement('span');
      wrap.className = 'habit-market-item';
      const symbol = document.createElement('span');
      symbol.className = 'habit-market-symbol';
      symbol.textContent = item.symbol;
      const text = document.createElement('span');
      text.className = 'habit-market-text';
      text.textContent = item.text;
      wrap.appendChild(symbol);
      wrap.appendChild(text);
      habitTrack.appendChild(wrap);
    });
  }
  function startHabitTicker() {
    renderHabitMarket();
    if (habitTickerTimer) clearInterval(habitTickerTimer);
    habitTickerTimer = setInterval(renderHabitMarket, 5000);
  }
  function renderHabitGrid(state) {
    const grid = document.getElementById('habitGrid');
    if (!grid) return;
    const today = new Date(getActiveDateString() + 'T12:00:00');
    const start = new Date(today);
    start.setDate(today.getDate() - 90);
    const offset = start.getDay();
    start.setDate(start.getDate() - offset);
    grid.innerHTML = '';
    for (let i = 0; i < 98; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const dateStr = dateToKey(d);
      const future = d > today;
      const filteredHabits = activeHabitGrid === 'all'
        ? state.habits
        : state.habits.filter(h => h.id === activeHabitGrid);
      const done = future ? 0 : filteredHabits.filter(h => isHabitDone(state, h.id, dateStr)).length;
      const ratio = filteredHabits.length ? done / filteredHabits.length : 0;
      const level = ratio === 0 ? 0 : Math.max(1, Math.ceil(ratio * 4));
      const cell = document.createElement('span');
      cell.className = 'habit-cell' + (level ? ' l' + level : '');
      cell.title = dateStr + ': ' + done + '/' + filteredHabits.length;
      grid.appendChild(cell);
    }
  }
  function bindHabitGridFilters() {
    document.querySelectorAll('[data-habit-grid]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeHabitGrid = btn.dataset.habitGrid || 'all';
        document.querySelectorAll('[data-habit-grid]').forEach(b => {
          b.classList.toggle('is-active', b.dataset.habitGrid === activeHabitGrid);
        });
        renderHabitGrid(getHabitState());
      });
    });
  }
  function bindHabitAdd() {
    const input = document.getElementById('habitInput');
    const btn = document.getElementById('habitAddBtn');
    if (!input || !btn) return;
    function submit() {
      addHabit(input.value);
      input.value = '';
      input.focus();
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submit(); }
    });
  }
  function renderHabits() {
    const state = getHabitState();
    const today = getActiveDateString();
    const done = state.habits.filter(h => isHabitDone(state, h.id, today)).length;
    document.getElementById('habitTodayStat').textContent = done + '/' + state.habits.length;
    const best = state.habits.reduce((max, h) => Math.max(max, habitBestStreak(state, h.id)), 0);
    document.getElementById('habitBestStat').textContent = best + 'd';
    const list = document.getElementById('habitList');
    list.innerHTML = '';
    state.habits.forEach(h => {
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'habit-row' + (isHabitDone(state, h.id, today) ? ' is-done' : '');
      row.innerHTML =
        '<span class="habit-check">✓</span>' +
        '<span class="habit-main">' +
          '<span class="habit-name"></span>' +
          '<span class="habit-meta"></span>' +
        '</span>';
      row.querySelector('.habit-name').textContent = h.name;
      row.querySelector('.habit-meta').textContent =
        habitStreak(state, h.id) + ' day streak · ' + habitRate(state, h.id) + '% last 30d';
      row.addEventListener('click', () => toggleHabit(h.id));
      list.appendChild(row);
    });
    renderHabitGrid(state);
  }

  // ---------- rollover: pull undone older goals into today ----------
  function rollover() {
    const todayDateStr = getActiveDateString();
    const todayK = 'goals:' + todayDateStr;
    let today = getGoals(todayK);
    const texts = new Set(today.map(g => g.text));

    storeListKeys('goals:').forEach(k => {
      const dateStr = k.slice('goals:'.length);
      if (dateStr >= todayDateStr) return;
      const old = getGoals(k);
      old.forEach(g => {
        if (!g.done && g.text && !texts.has(g.text)) {
          today.push({ text: g.text, done: false });
          texts.add(g.text);
        }
      });
      storeDelete(k);
    });
    setGoals(todayK, today);
  }

  // ---------- streak ----------
  function loadStreak() {
    const s = storeGet('goal_streak_v1');
    if (s && typeof s.count === 'number') return s;
    return { count: 0, lastProcessedDate: '' };
  }
  function saveStreak(s) { storeSet('goal_streak_v1', s); }

  function processStreak() {
    const s = loadStreak();
    const todayDateStr = getActiveDateString();
    const keys = storeListKeys('goals:')
      .map(k => k.slice('goals:'.length))
      .filter(d => d < todayDateStr)
      .sort();
    keys.forEach(dateStr => {
      if (s.lastProcessedDate && dateStr <= s.lastProcessedDate) return;
      const list = getGoals('goals:' + dateStr);
      if (list.length === 0) { /* don't break the streak on empty days */ }
      else if (list.every(g => g.done)) s.count += 1;
      else s.count = 0;
      s.lastProcessedDate = dateStr;
    });
    saveStreak(s);
  }

  // ---------- Goal Ticker ----------
  const tickerStage = document.getElementById('goalTickerStage');
  const tickerMeta  = document.getElementById('goalTickerMeta');
  let cycleIdx = 0;
  let tickerTimer = null;

  function buildTickerItems() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    if (total === 0) return { items: [{ status: 'empty',   text: 'No goals set for today — add one to get rolling.' }], done, total };
    if (done === total) return { items: [{ status: 'done', text: '✓ All goals done — solid day.' }], done, total };
    const items = goals.filter(g => !g.done).map(g => ({ status: 'pending', text: g.text }));
    return { items, done, total };
  }

  function statusGlyph(status) {
    if (status === 'done') return '✓';
    if (status === 'pending') return '○';
    return '·';
  }

  let firstTick = true;
  function tick() {
    const { items, done, total } = buildTickerItems();
    if (cycleIdx >= items.length) cycleIdx = 0;
    const item = items[cycleIdx];
    cycleIdx = (cycleIdx + 1) % items.length;
    tickerMeta.textContent = done + '/' + total;

    let row = tickerStage.querySelector('.goal-ticker-row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'goal-ticker-row';
      row.innerHTML =
        '<span class="goal-ticker-status"></span>' +
        '<span class="goal-ticker-text"></span>';
      tickerStage.appendChild(row);
    }

    const statusEl = row.querySelector('.goal-ticker-status');
    const textEl   = row.querySelector('.goal-ticker-text');

    const apply = () => {
      statusEl.setAttribute('data-status', item.status);
      statusEl.textContent = statusGlyph(item.status);
      textEl.textContent = item.text;
      row.classList.remove('is-fading');
    };

    if (firstTick) { apply(); firstTick = false; return; }
    row.classList.add('is-fading');
    setTimeout(apply, 220);
  }

  function startTicker() {
    tick();
    if (tickerTimer) clearInterval(tickerTimer);
    tickerTimer = setInterval(tick, 5000);
  }

  window.addEventListener('goals-changed', () => {
    cycleIdx = 0;
    tick();
  });

  // ---------- Day Ring ----------
  const PALETTE = [
    [0,    [255, 216, 158]],
    [12.5, [255, 205, 121]],
    [25,   [255, 227, 143]],
    [37.5, [255, 183, 106]],
    [50,   [255, 149,  89]],
    [62.5, [243, 111,  79]],
    [75,   [226,  93, 122]],
    [87.5, [123,  91, 176]],
    [100,  [ 47,  58, 102]]
  ];
  function lerp(a, b, t) { return a + (b - a) * t; }
  function paletteAt(p) {
    if (p <= PALETTE[0][0]) return PALETTE[0][1];
    if (p >= PALETTE[PALETTE.length - 1][0]) return PALETTE[PALETTE.length - 1][1];
    for (let i = 0; i < PALETTE.length - 1; i++) {
      const [p0, c0] = PALETTE[i];
      const [p1, c1] = PALETTE[i + 1];
      if (p >= p0 && p <= p1) {
        const t = (p - p0) / (p1 - p0);
        return [lerp(c0[0], c1[0], t), lerp(c0[1], c1[1], t), lerp(c0[2], c1[2], t)];
      }
    }
    return [255,255,255];
  }
  function rgb(c) { return 'rgb(' + Math.round(c[0]) + ',' + Math.round(c[1]) + ',' + Math.round(c[2]) + ')'; }

  function formatClock(d) {
    let h = d.getHours();
    const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;
    return h + ':' + pad2(m) + ' ' + ampm;
  }
  function formatRemaining(totalMin) {
    const h = Math.floor(totalMin / 60);
    const m = Math.floor(totalMin % 60);
    return h + 'h ' + m + 'm';
  }

  const C = 2 * Math.PI * 52;
  const fillEl = document.getElementById('dayRingFill');
  fillEl.setAttribute('stroke-dasharray', C);
  fillEl.setAttribute('stroke-dashoffset', C);

  function updateDayRing() {
    const now = new Date();
    const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    const percentEl   = document.getElementById('dayRingPercent');
    const phaseEl     = document.getElementById('dayRingPhase');
    const clockEl     = document.getElementById('dayRingClock');
    const statusEl    = document.getElementById('dayRingStatus');
    const remainingEl = document.getElementById('dayRingRemaining');

    clockEl.textContent = formatClock(now);

    if (hours < WAKE_HOUR) {
      fillEl.setAttribute('stroke-dashoffset', C);
      fillEl.style.stroke = '#4D4B47';
      percentEl.textContent = '—';
      phaseEl.textContent   = 'SLEEPING';
      statusEl.textContent  = '😴 Still sleeping';
      const minsUntil = (WAKE_HOUR - hours) * 60;
      remainingEl.textContent = formatRemaining(minsUntil) + ' until wake-up';
      return;
    }

    if (hours >= SLEEP_HOUR) {
      fillEl.setAttribute('stroke-dashoffset', 0);
      fillEl.style.stroke = '#E25D7A';
      percentEl.textContent = '100%';
      phaseEl.textContent   = 'PAST BEDTIME';
      statusEl.textContent  = '⚠️ Past bedtime';
      remainingEl.textContent = 'Sleep!';
      return;
    }

    const span = SLEEP_HOUR - WAKE_HOUR;
    const percent = (hours - WAKE_HOUR) / span * 100;
    fillEl.setAttribute('stroke-dashoffset', C * (1 - percent / 100));
    fillEl.style.stroke = rgb(paletteAt(percent));
    percentEl.textContent = Math.floor(percent) + '%';

    let phase, status;
    if (percent < 25)      { phase = 'MORNING';   status = '☀️ Morning — fresh start'; }
    else if (percent < 50) { phase = 'MIDDAY';    status = '⚡ Midday — keep moving'; }
    else if (percent < 75) { phase = 'AFTERNOON'; status = '🔥 Afternoon — push it'; }
    else if (percent < 90) { phase = 'EVENING';   status = '⏳ Evening — wrap up'; }
    else                   { phase = 'BEDTIME';   status = '🌙 Bedtime soon'; }
    phaseEl.textContent  = phase;
    statusEl.textContent = status;

    const minsLeft = (SLEEP_HOUR - hours) * 60;
    remainingEl.textContent = formatRemaining(minsLeft) + ' awake time left';
  }

  // ---------- Row building ----------
  function makeInlineEdit(textEl, goals, idx, key, reload) {
    textEl.addEventListener('click', () => {
      if (textEl.getAttribute('contenteditable') === 'true') return;
      const original = textEl.textContent;
      textEl.setAttribute('contenteditable', 'true');
      textEl.focus();
      const range = document.createRange();
      range.selectNodeContents(textEl);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);

      function commit() {
        const next = textEl.textContent.trim();
        textEl.removeAttribute('contenteditable');
        if (next && next !== original) {
          const list = getGoals(key);
          if (list[idx]) { list[idx].text = next; setGoals(key, list); }
          reload();
        } else {
          textEl.textContent = original;
        }
      }
      function cancel() {
        textEl.removeAttribute('contenteditable');
        textEl.textContent = original;
      }
      textEl.addEventListener('blur', commit, { once: true });
      textEl.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); textEl.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); cancel(); }
      });
    });
  }

  function wireDragReorder(row, listEl, key, reload) {
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.idx);
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      row.classList.add('is-drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('is-drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('is-drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to   = parseInt(row.dataset.idx, 10);
      if (isNaN(from) || isNaN(to) || from === to) return;
      const list = getGoals(key);
      const [moved] = list.splice(from, 1);
      list.splice(to, 0, moved);
      setGoals(key, list);
      reload();
    });
  }

  function buildGoalRow(goal, idx, key, readOnly, reload) {
    const li = document.createElement('li');
    li.className = 'gm-row';
    li.dataset.idx = String(idx);
    if (goal.done) li.classList.add('gm-row-done');
    if (goal.queued) li.classList.add('gm-row-queued');

    const handle = document.createElement('span');
    handle.className = 'gm-handle';
    handle.textContent = '⋮⋮';
    li.appendChild(handle);

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'gm-check';
    cb.checked = !!goal.done;
    if (readOnly) cb.disabled = true;
    cb.addEventListener('change', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].done = cb.checked;
      if (cb.checked) list[idx].doneAt = Date.now();
      else delete list[idx].doneAt;
      setGoals(key, list);
      reload();
    });
    li.appendChild(cb);

    const text = document.createElement('span');
    text.className = 'gm-text';
    text.textContent = goal.text;
    li.appendChild(text);
    makeInlineEdit(text, null, idx, key, reload);

    const term = document.createElement('span');
    term.className = 'gm-term-badge';
    term.textContent = goalTerm(goal) === 'long' ? 'Long' : 'Short';
    li.appendChild(term);

    const queueBtn = document.createElement('button');
    queueBtn.type = 'button';
    queueBtn.className = 'gm-queue-btn' + (goal.queued ? ' gm-queue-active' : '');
    queueBtn.textContent = '⚡';
    queueBtn.title = 'Queue for productivity window';
    if (readOnly) queueBtn.disabled = true;
    queueBtn.addEventListener('click', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].queued = !list[idx].queued;
      setGoals(key, list);
      li.classList.add('is-queue-flashing');
      setTimeout(reload, 480);
    });
    li.appendChild(queueBtn);

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'goal-delete';
    del.setAttribute('aria-label', 'Delete goal');
    del.textContent = '×';
    del.addEventListener('click', () => {
      const list = getGoals(key);
      list.splice(idx, 1);
      setGoals(key, list);
      reload();
    });
    li.appendChild(del);

    wireDragReorder(li, null, key, reload);
    return li;
  }

  // ---------- Renderers ----------
  function renderTodayHeader() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    document.getElementById('gmProgressNum').textContent   = done;
    document.getElementById('gmProgressTotal').textContent = '/ ' + total;
    const label = document.getElementById('gmProgressLabel');
    if (total === 0)        label.textContent = 'no goals yet';
    else if (done === total) label.textContent = 'all done — solid day';
    else                     label.textContent = 'complete';

    document.getElementById('todayLabel').textContent =
      'Today — ' + formatDate(getActiveDateString());

    const bar = document.getElementById('gmBar');
    bar.innerHTML = '';
    goals.forEach(g => {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (g.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });

    const card = document.getElementById('gmCardToday');
    card.classList.toggle('gm-all-done', total > 0 && done === total);
  }

  function renderStreak() {
    const s = loadStreak();
    document.getElementById('gmStreakNum').textContent = s.count;
    document.getElementById('gmStreak').classList.toggle('gm-streak-active', s.count > 0);
  }

  function renderListInto(goals, listEl, emptyEl, key, readOnly) {
    listEl.innerHTML = '';
    const entries = visibleGoals(goals);
    emptyEl.style.display = entries.length === 0 ? 'block' : 'none';
    emptyEl.textContent = goals.length === 0
      ? 'No goals for today yet — add one below.'
      : 'No ' + activeGoalFilter.replace('all', '') + ' goals in this filter.';
    const reload = loadToday;

    const visible = entries.length > 5 ? entries.slice(0, 5) : entries;
    visible.forEach(entry => listEl.appendChild(buildGoalRow(entry.goal, entry.idx, key, readOnly, reload)));

    if (entries.length > 5) {
      let expanded = false;
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'gm-show-toggle';
      const updateLabel = () => {
        toggle.textContent = expanded ? 'Show less ▴' : ('Show ' + (entries.length - 5) + ' more ▾');
      };
      updateLabel();
      toggle.addEventListener('click', () => {
        expanded = !expanded;
        if (expanded) {
          entries.slice(5).forEach(entry => {
            const row = buildGoalRow(entry.goal, entry.idx, key, readOnly, reload);
            listEl.insertBefore(row, toggle);
          });
        } else {
          Array.from(listEl.querySelectorAll('.gm-row')).slice(5).forEach(r => r.remove());
        }
        updateLabel();
      });
      listEl.appendChild(toggle);
    }

    renderTodayHeader();
  }

  function loadToday() {
    const goals = getGoals(todayKey());
    renderListInto(goals, document.getElementById('goalList'), document.getElementById('emptyState'), todayKey(), false);
  }
  function bindGoalFilters() {
    document.querySelectorAll('[data-goal-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeGoalFilter = btn.dataset.goalFilter || 'all';
        document.querySelectorAll('[data-goal-filter]').forEach(b => {
          b.classList.toggle('is-active', b.dataset.goalFilter === activeGoalFilter);
        });
        loadToday();
      });
    });
    document.querySelectorAll('[data-goal-term]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeGoalTerm = btn.dataset.goalTerm === 'long' ? 'long' : 'short';
        document.querySelectorAll('[data-goal-term]').forEach(b => {
          b.classList.toggle('is-active', b.dataset.goalTerm === activeGoalTerm);
        });
      });
    });
  }
  function bindManualSync() {
    const btn = document.getElementById('manualSyncBtn');
    const status = document.getElementById('manualSyncStatus');
    if (!btn || !status) return;
    btn.addEventListener('click', async () => {
      if (typeof window.cloudSyncNow !== 'function') {
        status.textContent = 'Cloud sync is still loading.';
        return;
      }
      btn.disabled = true;
      status.textContent = 'Syncing...';
      try {
        await window.cloudSyncNow();
        status.textContent = 'Synced just now.';
      } catch (e) {
        status.textContent = 'Sync failed. Try again when online.';
      } finally {
        btn.disabled = false;
      }
    });
    window.addEventListener('cloud-sync-status', (e) => {
      const detail = e.detail || {};
      if (detail.appKey !== 'goals') return;
      if (detail.state === 'pushed') status.textContent = 'Phone changes pushed.';
      else if (detail.state === 'pulled') status.textContent = 'Latest cloud data loaded.';
      else if (detail.state === 'error') status.textContent = detail.message || 'Sync needs a retry.';
    });
  }
  // ---------- Add + Polish handlers ----------
  function showStatus(el, message, isError) {
    el.textContent = message;
    el.classList.toggle('gm-status-error', !!isError);
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ''; el.classList.remove('gm-status-error'); }, 3500);
  }

  async function polishOne(text) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content:
            'Rewrite this single goal so it is concrete, action-oriented, and under 60 characters. ' +
            'Return ONLY a JSON array with exactly one string, no preamble, no code fences.\n\nGoal: ' + text
        }]
      })
    });
    const data = await res.json();
    const content = (data && data.content && data.content[0] && data.content[0].text) || '';
    const arr = JSON.parse(content);
    if (!Array.isArray(arr) || arr.length < 1 || typeof arr[0] !== 'string') throw new Error('bad response');
    return arr[0].trim();
  }

  function makeAddHandlers(input, addBtn, polishBtn, key, statusEl, reload) {
    function plainAdd(text) {
      const list = getGoals(key);
      list.push({ text, done: false, term: activeGoalTerm });
      setGoals(key, list);
      input.value = '';
      reload();
    }
    addBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      plainAdd(text);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
    });
    polishBtn.addEventListener('click', async () => {
      const text = input.value.trim();
      if (!text) return;
      if (!ANTHROPIC_API_KEY) {
        plainAdd(text);
        showStatus(statusEl, 'Polish needs an Anthropic API key — added as-typed.', false);
        return;
      }
      polishBtn.disabled = true;
      try {
        const polished = await polishOne(text);
        plainAdd(polished);
      } catch (e) {
        plainAdd(text);
        showStatus(statusEl, 'Polish failed — added as-typed.', true);
      } finally {
        polishBtn.disabled = false;
      }
    });
  }

  makeAddHandlers(
    document.getElementById('goalInput'),
    document.getElementById('goalAddBtn'),
    document.getElementById('goalPolishBtn'),
    todayKey(),
    document.getElementById('polishStatus'),
    loadToday
  );

  // ---------- Boot ----------
  rollover();
  processStreak();
  setHabitState(getHabitState());
  loadToday();
  renderStreak();
  renderHabits();
  bindHabitGridFilters();
  bindHabitAdd();
  bindGoalFilters();
  bindManualSync();
  updateDayRing();
  setInterval(updateDayRing, 60 * 1000);
  startTicker();
  startHabitTicker();

  // Re-render when storage changes from another tab (or our bridged parent).
  window.addEventListener('storage', () => {
    loadToday(); renderStreak(); renderHabits(); renderHabitMarket();
  });
  window.addEventListener('habits-changed', () => {
    renderHabits(); renderHabitMarket();
  });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedKeys: ['habits:v1'],
    syncedPrefixes: ['goals:'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('goals-changed'));
      window.dispatchEvent(new CustomEvent('habits-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
